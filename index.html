<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>와룡전 - 웹 플레이어</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#050a08; }
body { font-family:'Malgun Gothic',sans-serif; display:flex; flex-direction:column; align-items:center; min-height:100vh; }
header { width:100%; max-width:1040px; padding:14px 24px 10px; display:flex; align-items:center; gap:16px; border-bottom:1px solid #0a2018; }
header h1 { font-size:18px; font-weight:700; letter-spacing:4px; color:#a0e8c0; }
header span { font-size:11px; color:#0a2018; letter-spacing:2px; }
#game-wrap { width:100%; max-width:1024px; margin:16px auto 0; aspect-ratio:4/3; position:relative; }
#game { width:100%; height:100%; }
.info { width:100%; max-width:1024px; margin:10px auto 0; display:flex; align-items:center; gap:12px; padding:0 4px; font-size:11px; color:#0a2018; letter-spacing:1px; }
.hint { margin-left:auto; }
footer { margin:24px auto; font-size:10px; color:#0a2018; letter-spacing:2px; text-align:center; }
</style>
</head>
<body>
<header>
  <h1>臥 龍 傳</h1>
  <span>와룡전 · KOEI 1993</span>
</header>
<div id="game-wrap">
  <div id="game"></div>
</div>
<div class="info">
  <span>💾 세이브는 브라우저에 자동 보존됩니다</span>
  <span class="hint">패스워드: <b style="color:#a0e8c0">000000</b></span>
</div>
<footer>KOEI 1993 · EmulatorJS DOSBox · 세이브 데이터 IndexedDB 자동 보존</footer>

<script>
// EmulatorJS 설정
window.EJS_player = '#game';
window.EJS_core = 'dosbox_pure';
window.EJS_gameUrl = './lyingdragon.zip';
window.EJS_gameName = 'LYD';
window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
window.EJS_startOnLoaded = true;
window.EJS_language = 'ko';
window.EJS_color = '#a0e8c0';

// 세이브 데이터 자동 보존 (IndexedDB)
window.EJS_Buttons = {
  playPause: true,
  restart: true,
  mute: true,
  settings: true,
  fullscreen: true,
  saveState: true,
  loadState: true,
  screenRecord: false,
  gamepad: true,
  cheat: false,
  volume: true,
  saveSavFiles: true,  // 세이브 파일 자동 보존 핵심 옵션
  loadSavFiles: true,
  screenShot: false,
  cacheManager: false,
};
</script>
<script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
</body>
</html>
